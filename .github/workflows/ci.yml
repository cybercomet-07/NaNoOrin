name: CI

on:
  push:
    branches: [main, master, Master]
  pull_request:
    branches: [main, master, Master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orin-ai/backend
    env:
      ORIN_SKIP_STARTUP_VALIDATION: "1"
      # Harmless placeholders so `llm_clients` can be imported during test
      # collection without a `.env` file present on CI.
      GROQ_API_KEY_1: "ci-placeholder"
      GROQ_API_KEY_2: "ci-placeholder"
      GROQ_API_KEY_3: "ci-placeholder"
      GROQ_API_KEY_4: "ci-placeholder"
      TAVILY_API_KEY: "ci-placeholder"
      E2B_API_KEY: "ci-placeholder"
      LOGFIRE_TOKEN: "ci-placeholder"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: orin-ai/backend/requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Diagnostics
        if: always()
        run: |
          python --version
          pip --version
          pip list

      - name: Run tests
        run: pytest -q --tb=short

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orin-ai/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: orin-ai/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  compose-config:
    name: Docker Compose (validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: |
          # docker-compose references env_file: .env (relative to orin-ai/); create empty file for CI
          touch orin-ai/.env
          docker compose -f orin-ai/docker-compose.yml config -q
